<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enza Rigano — Oficial</title>
  <meta name="description" content="Sitio oficial de Enza Rigano. Música, fotos, videos y tienda oficial."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* DISEÑO PALETA HERO */
    .hero-section {
      position: relative !important;
      height: 85vh !important;
      width: 100% !important;
      overflow: hidden !important;
      display: flex !important;
      align-items: center !important;
      background: var(--color-lila-bg) !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    .hero-bg-img {
      position: absolute !important;
      right: 0 !important;
      top: 0 !important;
      height: 100% !important;
      width: auto !important;
      object-fit: contain !important;
      z-index: 1 !important;
      pointer-events: none !important;
    }
    .hero-overlay {
      display: none !important;
    }
    .hero-container {
      position: relative !important;
      z-index: 10 !important;
      width: 100% !important;
      max-width: 1300px !important;
      margin: 0 auto !important;
      padding: 0 5% !important;
    }
    .hero-content {
      max-width: 600px !important;
      color: var(--color-text-brown) !important;
    }
    .hero-title {
      font-family: 'Playfair Display', serif !important;
      font-size: clamp(3rem, 8vw, 6rem) !important;
      font-weight: 700 !important;
      line-height: 1 !important;
      margin-bottom: 1.5rem !important;
      color: var(--color-accent-purple) !important;
      text-transform: uppercase !important;
    }
    .hero-title span {
      display: block !important;
      color: transparent !important;
      -webkit-text-stroke: 1px var(--color-accent-purple) !important;
    }
    .hero-subtitle {
      font-size: 1.1rem !important;
      margin-bottom: 2rem !important;
      opacity: 0.9 !important;
      color: var(--color-text-brown) !important;
      max-width: 400px !important;
    }
    .hero-btns {
      display: flex !important;
      gap: 1rem !important;
    }
    .btn-outline {
      border: 1px solid var(--color-accent-purple) !important;
      color: var(--color-accent-purple) !important;
      padding: 1rem 2.5rem !important;
      border-radius: 50px !important;
      text-transform: uppercase !important;
      font-weight: 700 !important;
      letter-spacing: 1px !important;
    }
  </style>
</head>
